<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Добави Анализ - Китай в XXI век</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-danger shadow-sm mb-5">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">🇨🇳 Админ Панел</a>
      <a href="index.html" class="btn btn-outline-light btn-sm">Към сайта</a>
    </div>
  </nav>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white py-3">
            <h3 class="mb-0 text-danger">Публикуване на нов анализ</h3>
          </div>
          <div class="card-body p-4">
            <form id="add-article-form">
              <div class="mb-3">
                <label class="form-label fw-bold">Заглавие</label>
                <input type="text" id="title" class="form-control" placeholder="Въведете заглавие..." required>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Съдържание</label>
                <textarea id="content" class="form-control" rows="10" placeholder="Напишете анализа тук..." required></textarea>
              </div>
              <div class="d-grid">
                <button type="submit" id="submit-btn" class="btn btn-danger btn-lg">Публикувай в сайта</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/add-article.js"></script>
</body>
</html>
